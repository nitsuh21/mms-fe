name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: https://dev-mms-api.andlay.app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Non-blocking until the lint debt from the TailAdmin template era is paid
      # down (see docs/changes/0002 & 0005). Do not add new errors.
      - name: Lint (report only)
        run: pnpm lint
        continue-on-error: true

      - name: Build
        run: pnpm build
